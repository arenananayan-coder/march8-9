<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Մարտի 8 Հրավեր</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, #ffe6f0, #ffd6eb, #ffc2e0);
    background-attachment: fixed;
}

.container {
    background: rgba(255, 255, 255, 0.85);
    padding: 40px 25px;
    border-radius: 20px;
    max-width: 600px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

h1 {
    color: #c2185b;
    font-size: 26px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    line-height: 1.7;
    color: #444;
}

.footer {
    margin-top: 25px;
    font-style: italic;
    color: #b03060;
}
</style>

</head>
<body>

<div class="container">

<h1>🌸 Սիրելի՜ ուսուցիչներ 🌸</h1>

<p>
Գարնան այս գեղեցիկ տոնի առթիվ ցանկանում ենք Ձեզ պարգևել մի փոքրիկ ժպիտ և հաճելի ակնթարթներ։ 
Խնդրում ենք ընդունել մեր հրավերը և ներկա գտնվել մեր պատրաստած տոնական միջոցառմանը։
</p>

<p class="footer">
Մենք սպասում ենք Ձեզ սիրով և անհամբերությամբ։
</p>

</div>

</body>
</html>
